# ============================================================
# Site-only nginx config for appbi-integration
# Domain: integration.base-datateam.com
#
# Copy to:
#   /etc/nginx/sites-available/appbi-integration.conf
# Enable with:
#   sudo ln -sf /etc/nginx/sites-available/appbi-integration.conf /etc/nginx/sites-enabled/appbi-integration.conf
#
# Certificate was issued via:
#   certbot certonly --webroot -w /var/www/html -d integration.base-datateam.com
# ============================================================

# ---- HTTP: ACME renewal + redirect to HTTPS ----
server {
    listen 80;
    listen [::]:80;
    server_name integration.base-datateam.com;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ---- HTTPS ----
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name integration.base-datateam.com;

    ssl_certificate     /etc/letsencrypt/live/integration.base-datateam.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/integration.base-datateam.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 250m;

    add_header X-Frame-Options            "SAMEORIGIN" always;
    add_header X-Content-Type-Options     "nosniff" always;
    add_header X-XSS-Protection           "1; mode=block" always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security  "max-age=63072000; includeSubDomains; preload" always;

    location / {
        proxy_pass         http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade            $http_upgrade;
        proxy_set_header   Connection         "upgrade";
        proxy_set_header   Host               $host;
        proxy_set_header   X-Real-IP          $remote_addr;
        proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto  $scheme;
        proxy_read_timeout 300s;
        proxy_buffering    off;
    }

    location /api/v1/ {
        proxy_pass         http://127.0.0.1:8010/api/v1/;
        proxy_http_version 1.1;
        proxy_set_header   Host               $host;
        proxy_set_header   X-Real-IP          $remote_addr;
        proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto  $scheme;
        proxy_read_timeout 300s;
    }
}
