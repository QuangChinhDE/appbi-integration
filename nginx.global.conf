# ============================================================
# Shared Nginx main config for a single VM hosting:
#   1. appbi-ai
#   2. appbi-integration
#
# This file is intended to replace /etc/nginx/nginx.conf.
# It contains ONLY global nginx settings and loads site files from:
#   - /etc/nginx/conf.d/*.conf
#   - /etc/nginx/sites-enabled/*.conf
#
# Expected site files:
#   - /etc/nginx/sites-available/appbi-ai.conf
#   - /etc/nginx/sites-available/appbi-integration.conf
#
# Safe rollout:
#   sudo cp /etc/nginx/nginx.conf /etc/nginx/nginx.conf.bak.$(date +%F-%H%M%S)
#   sudo cp /path/to/nginx.global.conf /etc/nginx/nginx.conf
#   sudo nginx -t
#   sudo systemctl reload nginx
#
# Fast rollback:
#   sudo cp /etc/nginx/nginx.conf.bak.<timestamp> /etc/nginx/nginx.conf
#   sudo nginx -t
#   sudo systemctl reload nginx
# ============================================================

user www-data;
worker_processes auto;
pid /run/nginx.pid;
error_log /var/log/nginx/error.log warn;
include /etc/nginx/modules-enabled/*.conf;

events {
    worker_connections 1024;
    multi_accept on;
}

http {

    # ── Basic Settings ────────────────────────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    types_hash_max_size 2048;
    server_tokens      off;

    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ── SSL / TLS Settings ────────────────────────────────────────────────────
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       10m;
    ssl_stapling              on;
    ssl_stapling_verify       on;

    # ── Logging ───────────────────────────────────────────────────────────────
    access_log /var/log/nginx/access.log;

    # ── Gzip Compression ──────────────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_buffers      16 8k;
    gzip_http_version 1.1;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/json application/javascript application/xml+rss
        application/atom+xml image/svg+xml;

    # ── Shared include points ─────────────────────────────────────────────────
    # conf.d is kept for compatibility with standard Ubuntu nginx packaging.
    include /etc/nginx/conf.d/*.conf;

    # Each app should live in its own site file under sites-enabled.
    include /etc/nginx/sites-enabled/*.conf;
}