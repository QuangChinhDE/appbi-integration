version: 3.9.6

type: DeclarativeSource

check:
  type: CheckStream
  stream_names:
    - workflow

definitions:
  streams:
    job:
      type: DeclarativeStream
      name: job
      retriever:
        type: SimpleRetriever
        paginator:
          type: DefaultPaginator
          page_size_option:
            type: RequestOption
            field_name: limit
            inject_into: body_data
          page_token_option:
            type: RequestOption
            field_name: page_id
            inject_into: body_data
          pagination_strategy:
            type: PageIncrement
            page_size: 500
            start_from_page: 0
        requester:
          $ref: '#/definitions/base_requester'
          path: jobs/get
          http_method: POST
          request_headers:
            User-Agent: >-
              Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like
              Gecko) Chrome/77.0.3865.90 Safari/537.36
            Content-Type: application/x-www-form-urlencoded
          request_body_data:
            access_token: '{{ config[''access_token''] }}'
        record_selector:
          type: RecordSelector
          extractor:
            type: DpathExtractor
            field_path:
              - jobs
      primary_key:
        - id
      schema_loader:
        type: InlineSchemaLoader
        schema:
          $ref: '#/schemas/job'
      incremental_sync:
        type: DatetimeBasedCursor
        step: P1000Y
        cursor_field: last_update
        end_datetime:
          type: MinMaxDatetime
          datetime: '{{ now_utc().strftime(''%Y-%m-%dT%H:%M:%SZ'') }}'
          datetime_format: '%Y-%m-%dT%H:%M:%SZ'
        start_datetime:
          type: MinMaxDatetime
          datetime: '{{ config[''updated_from''] }}'
          datetime_format: '%s'
        datetime_format: '%s'
        start_time_option:
          type: RequestOption
          field_name: updated_from
          inject_into: request_parameter
        cursor_granularity: PT1S
        cursor_datetime_formats:
          - '%s'
    stage:
      type: DeclarativeStream
      name: stage
      retriever:
        type: SimpleRetriever
        requester:
          $ref: '#/definitions/base_requester'
          path: workflow/stages
          http_method: POST
          request_headers:
            User-Agent: >-
              Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like
              Gecko) Chrome/77.0.3865.90 Safari/537.36
          request_body_data:
            id: '{{ stream_partition.id }}'
            access_token: '{{ config[''access_token''] }}'
        record_selector:
          type: RecordSelector
          extractor:
            type: DpathExtractor
            field_path:
              - stages
        partition_router:
          type: SubstreamPartitionRouter
          parent_stream_configs:
            - type: ParentStreamConfig
              stream:
                $ref: '#/definitions/streams/workflow'
              parent_key: id
              partition_field: id
      primary_key:
        - id
      schema_loader:
        type: InlineSchemaLoader
        schema:
          $ref: '#/schemas/stage'
    workflow:
      type: DeclarativeStream
      name: workflow
      retriever:
        type: SimpleRetriever
        paginator:
          type: DefaultPaginator
          page_size_option:
            type: RequestOption
            field_name: limit
            inject_into: body_data
          page_token_option:
            type: RequestOption
            field_name: page_id
            inject_into: body_data
          pagination_strategy:
            type: PageIncrement
            page_size: 20
            start_from_page: 0
        requester:
          $ref: '#/definitions/base_requester'
          path: workflows/get
          http_method: POST
          request_headers:
            User-Agent: >-
              Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like
              Gecko) Chrome/77.0.3865.90 Safari/537.36
            Content-Type: application/x-www-form-urlencoded
          request_body_data:
            access_token: '{{ config[''access_token''] }}'
        record_selector:
          type: RecordSelector
          extractor:
            type: DpathExtractor
            field_path:
              - workflows
      primary_key:
        - id
      schema_loader:
        type: InlineSchemaLoader
        schema:
          $ref: '#/schemas/workflow'
      incremental_sync:
        type: DatetimeBasedCursor
        step: P1000Y
        cursor_field: last_update
        end_datetime:
          type: MinMaxDatetime
          datetime: '{{ now_utc().strftime(''%Y-%m-%dT%H:%M:%SZ'') }}'
          datetime_format: '%Y-%m-%dT%H:%M:%SZ'
        start_datetime:
          type: MinMaxDatetime
          datetime: '{{ config[''updated_from''] }}'
          datetime_format: '%s'
        datetime_format: '%s'
        start_time_option:
          type: RequestOption
          field_name: updated_from
