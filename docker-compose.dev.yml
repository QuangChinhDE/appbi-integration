# Development stack for hot reload.
#
# Start dev stack:
#   docker compose -f docker-compose.dev.yml up --build -d
#
# Stop dev stack:
#   docker compose -f docker-compose.dev.yml down

services:
  postgres:
    image: postgres:15-alpine
    container_name: integrationhub-db-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-integrationhub}
      POSTGRES_USER: ${POSTGRES_USER:-integrationhub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-integrationhub_password_2026}
    ports:
      - "${POSTGRES_PORT:-5434}:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
      - ./packages/database/src/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - integrationhub-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-integrationhub}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: integrationhub-backend-dev
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-integrationhub}:${POSTGRES_PASSWORD:-integrationhub_password_2026}@postgres:5432/${POSTGRES_DB:-integrationhub}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      SECRET_KEY: ${SECRET_KEY:-change-this-secret-key-in-production-2026}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-${AUTH_BOOTSTRAP_EMAIL:-admin@appbi.local}}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-${AUTH_BOOTSTRAP_PASSWORD:-CHANGE_ME}}
      ADMIN_NAME: ${ADMIN_NAME:-${AUTH_BOOTSTRAP_NAME:-Platform Admin}}
      AUTH_BOOTSTRAP_ENABLED: ${AUTH_BOOTSTRAP_ENABLED:-true}
      AUTH_BOOTSTRAP_PRESET: ${AUTH_BOOTSTRAP_PRESET:-admin}
      AUTH_JWT_EXPIRE_MINUTES: ${AUTH_JWT_EXPIRE_MINUTES:-480}
      AUTH_PASSWORD_LOGIN_ENABLED: ${AUTH_PASSWORD_LOGIN_ENABLED:-true}
      AUTH_GOOGLE_ENABLED: ${AUTH_GOOGLE_ENABLED:-${AUTH_GOOGLE_LOGIN_ENABLED:-false}}
      AUTH_GOOGLE_AUTO_CREATE_USERS: ${AUTH_GOOGLE_AUTO_CREATE_USERS:-false}
      AUTH_GOOGLE_ALLOWED_DOMAINS: ${AUTH_GOOGLE_ALLOWED_DOMAINS:-}
      AUTH_GOOGLE_CLIENT_ID: ${AUTH_GOOGLE_CLIENT_ID:-}
      AUTH_GOOGLE_BOOTSTRAP_ADMIN_EMAIL: ${AUTH_GOOGLE_BOOTSTRAP_ADMIN_EMAIL:-${AUTH_GOOGLE_OWNER_EMAILS:-}}
      FEATURE_MODULE_BACKUP_ENABLED: ${FEATURE_MODULE_BACKUP_ENABLED:-true}
      FEATURE_MODULE_APPS_ENABLED: ${FEATURE_MODULE_APPS_ENABLED:-true}
      FEATURE_MODULE_PIPELINE_ENABLED: ${FEATURE_MODULE_PIPELINE_ENABLED:-true}
      FEATURE_MODULE_AUTOMATION_ENABLED: ${FEATURE_MODULE_AUTOMATION_ENABLED:-true}
      FEATURE_MODULE_SETTINGS_ENABLED: ${FEATURE_MODULE_SETTINGS_ENABLED:-true}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3002,http://frontend:3002}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-http://localhost:3002/api/v1/auth/google/data-access/callback}
      GCP_SERVICE_ACCOUNT_EMAIL: ${GCP_SERVICE_ACCOUNT_EMAIL:-}
      GCP_SERVICE_ACCOUNT_JSON: ${GCP_SERVICE_ACCOUNT_JSON:-}
      GCP_SERVICE_ACCOUNT_TYPE: ${GCP_SERVICE_ACCOUNT_TYPE:-service_account}
      GCP_SERVICE_ACCOUNT_PROJECT_ID: ${GCP_SERVICE_ACCOUNT_PROJECT_ID:-}
      GCP_SERVICE_ACCOUNT_PRIVATE_KEY_ID: ${GCP_SERVICE_ACCOUNT_PRIVATE_KEY_ID:-}
      GCP_SERVICE_ACCOUNT_PRIVATE_KEY: ${GCP_SERVICE_ACCOUNT_PRIVATE_KEY:-}
      GCP_SERVICE_ACCOUNT_CLIENT_EMAIL: ${GCP_SERVICE_ACCOUNT_CLIENT_EMAIL:-}
      GCP_SERVICE_ACCOUNT_CLIENT_ID: ${GCP_SERVICE_ACCOUNT_CLIENT_ID:-}
      GCP_SERVICE_ACCOUNT_AUTH_URI: ${GCP_SERVICE_ACCOUNT_AUTH_URI:-https://accounts.google.com/o/oauth2/auth}
      GCP_SERVICE_ACCOUNT_TOKEN_URI: ${GCP_SERVICE_ACCOUNT_TOKEN_URI:-https://oauth2.googleapis.com/token}
      GCP_SERVICE_ACCOUNT_AUTH_PROVIDER_X509_CERT_URL: ${GCP_SERVICE_ACCOUNT_AUTH_PROVIDER_X509_CERT_URL:-https://www.googleapis.com/oauth2/v1/certs}
      GCP_SERVICE_ACCOUNT_CLIENT_X509_CERT_URL: ${GCP_SERVICE_ACCOUNT_CLIENT_X509_CERT_URL:-}
      GCP_SERVICE_ACCOUNT_UNIVERSE_DOMAIN: ${GCP_SERVICE_ACCOUNT_UNIVERSE_DOMAIN:-googleapis.com}
      PYTHONPATH: /app
    ports:
      - "${BACKEND_PORT:-8010}:8000"
    volumes:
      - ./:/app
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - integrationhub-network
    command: uvicorn apps.api.src.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: .
      dockerfile: apps/web/Dockerfile.dev
    container_name: integrationhub-frontend-dev
    working_dir: /app
    restart: unless-stopped
    environment:
      CHOKIDAR_USEPOLLING: "true"
      VITE_API_URL: ${VITE_API_URL:-}
      VITE_AUTH_PASSWORD_ENABLED: ${VITE_AUTH_PASSWORD_ENABLED:-true}
      VITE_AUTH_GOOGLE_ENABLED: ${VITE_AUTH_GOOGLE_ENABLED:-true}
      VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID:-}
      VITE_PROXY_TARGET: http://backend:8000
      VITE_PORT: "3002"
    ports:
      - "${FRONTEND_PORT:-3002}:3002"
    volumes:
      - ./:/app
      - root_node_modules:/app/node_modules
      - web_node_modules:/app/apps/web/node_modules
    depends_on:
      - backend
    networks:
      - integrationhub-network

networks:
  integrationhub-network:
    driver: bridge

volumes:
  postgres_data_dev:
  root_node_modules:
  web_node_modules: