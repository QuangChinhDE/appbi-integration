# ============================================================
# IntegrationHub production stack
#
# Start production stack:
#   docker compose up --build -d
#
# Stop stack:
#   docker compose down
# ============================================================

services:
  postgres:
    image: postgres:15-alpine
    container_name: integrationhub-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-integrationhub}
      POSTGRES_USER: ${POSTGRES_USER:-integrationhub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-integrationhub_password_2026}
    ports:
      - "${POSTGRES_PORT:-5434}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./packages/database/src/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - integrationhub-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-integrationhub}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: integrationhub-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-integrationhub}:${POSTGRES_PASSWORD:-integrationhub_password_2026}@postgres:5432/${POSTGRES_DB:-integrationhub}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      SECRET_KEY: ${SECRET_KEY:-change-this-secret-key-in-production-2026}
      # Admin bootstrap — new canonical names with legacy fallbacks
      ADMIN_EMAIL: ${ADMIN_EMAIL:-${AUTH_BOOTSTRAP_EMAIL:-admin@appbi.local}}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-${AUTH_BOOTSTRAP_PASSWORD:-CHANGE_ME}}
      ADMIN_NAME: ${ADMIN_NAME:-${AUTH_BOOTSTRAP_NAME:-Platform Admin}}
      AUTH_BOOTSTRAP_ENABLED: ${AUTH_BOOTSTRAP_ENABLED:-true}
      AUTH_BOOTSTRAP_PRESET: ${AUTH_BOOTSTRAP_PRESET:-admin}
      AUTH_JWT_EXPIRE_MINUTES: ${AUTH_JWT_EXPIRE_MINUTES:-480}
      # Providers — aligned with appbi-ai naming
      AUTH_PASSWORD_LOGIN_ENABLED: ${AUTH_PASSWORD_LOGIN_ENABLED:-true}
      AUTH_GOOGLE_ENABLED: ${AUTH_GOOGLE_ENABLED:-${AUTH_GOOGLE_LOGIN_ENABLED:-false}}
      AUTH_GOOGLE_AUTO_CREATE_USERS: ${AUTH_GOOGLE_AUTO_CREATE_USERS:-false}
      AUTH_GOOGLE_ALLOWED_DOMAINS: ${AUTH_GOOGLE_ALLOWED_DOMAINS:-}
      AUTH_GOOGLE_CLIENT_ID: ${AUTH_GOOGLE_CLIENT_ID:-}
      AUTH_GOOGLE_BOOTSTRAP_ADMIN_EMAIL: ${AUTH_GOOGLE_BOOTSTRAP_ADMIN_EMAIL:-${AUTH_GOOGLE_OWNER_EMAILS:-}}
      FEATURE_MODULE_BACKUP_ENABLED: ${FEATURE_MODULE_BACKUP_ENABLED:-true}
      FEATURE_MODULE_APPS_ENABLED: ${FEATURE_MODULE_APPS_ENABLED:-true}
      FEATURE_MODULE_PIPELINE_ENABLED: ${FEATURE_MODULE_PIPELINE_ENABLED:-true}
      FEATURE_MODULE_AUTOMATION_ENABLED: ${FEATURE_MODULE_AUTOMATION_ENABLED:-true}
      FEATURE_MODULE_SETTINGS_ENABLED: ${FEATURE_MODULE_SETTINGS_ENABLED:-true}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3002,http://frontend:80}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-http://localhost:8010/api/google/callback}
      GCP_SERVICE_ACCOUNT_JSON: ${GCP_SERVICE_ACCOUNT_JSON:-}
      GCP_SERVICE_ACCOUNT_CLIENT_EMAIL: ${GCP_SERVICE_ACCOUNT_CLIENT_EMAIL:-${GCP_SERVICE_ACCOUNT_EMAIL:-}}
      GCP_SERVICE_ACCOUNT_PRIVATE_KEY: ${GCP_SERVICE_ACCOUNT_PRIVATE_KEY:-}
      GCP_SERVICE_ACCOUNT_PROJECT_ID: ${GCP_SERVICE_ACCOUNT_PROJECT_ID:-}
      PYTHONPATH: /app
    ports:
      - "${BACKEND_PORT:-8010}:8000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - integrationhub-network

  frontend:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-}
        VITE_AUTH_PASSWORD_ENABLED: ${VITE_AUTH_PASSWORD_ENABLED:-true}
        VITE_AUTH_GOOGLE_ENABLED: ${VITE_AUTH_GOOGLE_ENABLED:-true}
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID:-}
    container_name: integrationhub-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3002}:80"
    depends_on:
      - backend
    networks:
      - integrationhub-network

networks:
  integrationhub-network:
    driver: bridge

volumes:
  postgres_data:
