services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: integrationhub-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-integrationhub}
      POSTGRES_USER: ${POSTGRES_USER:-integrationhub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-integrationhub_password_2026}
    ports:
      - "${POSTGRES_PORT:-5434}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./packages/database/src/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - integrationhub-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-integrationhub}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API (FastAPI)
  backend:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: integrationhub-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-integrationhub}:${POSTGRES_PASSWORD:-integrationhub_password_2026}@postgres:5432/${POSTGRES_DB:-integrationhub}
      SECRET_KEY: ${SECRET_KEY:-change-this-secret-key-in-production-2026}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3002,http://localhost:3000,http://localhost:80}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-http://localhost:8010/api/google/callback}
      PYTHONPATH: /app
    ports:
      - "${BACKEND_PORT:-8010}:8000"
    volumes:
      - ./:/app
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - integrationhub-network
    command: uvicorn apps.api.src.main:app --host 0.0.0.0 --port 8000 --reload

  # Frontend (React + Vite)
  frontend:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: integrationhub-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3002}:80"
    depends_on:
      - backend
    networks:
      - integrationhub-network

networks:
  integrationhub-network:
    driver: bridge

volumes:
  postgres_data:
