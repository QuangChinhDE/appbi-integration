# ============================================================
# Site-only nginx config for appbi-ai
# Domain: report.base-datateam.com
#
# Copy to:
#   /etc/nginx/sites-available/appbi-ai.conf
# Enable with:
#   sudo ln -sf /etc/nginx/sites-available/appbi-ai.conf /etc/nginx/sites-enabled/appbi-ai.conf
#
# This file mirrors the nginx currently running on the VM, but strips
# out the global nginx directives so it can be loaded by nginx.global.conf.
# ============================================================

server {
    listen      80;
    listen      [::]:80;
    server_name report.base-datateam.com;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen      443 ssl http2;
    listen      [::]:443 ssl http2;
    server_name report.base-datateam.com;

    ssl_certificate     /etc/letsencrypt/live/report.base-datateam.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/report.base-datateam.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 250m;

    allow 127.0.0.1;
    allow ::1;
    allow 14.232.245.131;
    allow 222.252.17.120;
    allow 193.186.4.156;
    allow 113.190.230.3;
    allow 42.118.44.150;
    allow 14.161.49.226;
    allow 42.118.122.97;
    allow 118.69.12.18;
    allow 34.68.128.35;
    allow 42.114.24.80;
    allow all;

    add_header X-Frame-Options            "SAMEORIGIN" always;
    add_header X-Content-Type-Options     "nosniff" always;
    add_header X-XSS-Protection           "1; mode=block" always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security  "max-age=63072000; includeSubDomains; preload" always;
    add_header Content-Security-Policy    "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://accounts.google.com/gsi/client; style-src 'self' 'unsafe-inline'; connect-src 'self' wss: https://accounts.google.com/gsi/; img-src 'self' data: blob: https://*.gstatic.com https://*.googleusercontent.com; font-src 'self' data:; frame-src 'self' https://accounts.google.com/gsi/; frame-ancestors 'self'; base-uri 'self'; form-action 'self'" always;
    add_header Permissions-Policy         "camera=(), microphone=(), geolocation=()" always;

    location /embed/ {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade            $http_upgrade;
        proxy_set_header   Connection         "upgrade";
        proxy_set_header   Host               $host;
        proxy_set_header   X-Real-IP          $remote_addr;
        proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto  $scheme;
        proxy_read_timeout 300s;
        proxy_buffering    off;
        add_header         Cache-Control "no-store, no-cache, must-revalidate";
        add_header X-Content-Type-Options     "nosniff" always;
        add_header X-XSS-Protection           "1; mode=block" always;
        add_header Referrer-Policy            "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security  "max-age=63072000; includeSubDomains; preload" always;
        add_header Content-Security-Policy    "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://accounts.google.com/gsi/client; style-src 'self' 'unsafe-inline'; connect-src 'self' wss: https://accounts.google.com/gsi/; img-src 'self' data: blob: https://*.gstatic.com https://*.googleusercontent.com; font-src 'self' data:; frame-src 'self' https://accounts.google.com/gsi/; frame-ancestors *; base-uri 'self'; form-action 'self'" always;
        add_header Permissions-Policy         "camera=(), microphone=(), geolocation=()" always;
    }

    location /_next/static/ {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host               $host;
        proxy_set_header   X-Forwarded-Proto  $scheme;
        add_header         Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade            $http_upgrade;
        proxy_set_header   Connection         "upgrade";
        proxy_set_header   Host               $host;
        proxy_set_header   X-Real-IP          $remote_addr;
        proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto  $scheme;
        proxy_read_timeout 300s;
        proxy_buffering    off;
        add_header         Cache-Control "no-store, no-cache, must-revalidate";
    }

    location /api/v1/ {
        proxy_pass         http://127.0.0.1:8000/api/v1/;
        proxy_http_version 1.1;
        proxy_set_header   Host               $host;
        proxy_set_header   X-Real-IP          $remote_addr;
        proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto  $scheme;
        proxy_read_timeout 120s;
    }

    location = /agent/health { return 403; }

    location /agent/ {
        proxy_pass                  http://127.0.0.1:8002;
        proxy_http_version          1.1;
        proxy_set_header            Host               $host;
        proxy_set_header            X-Real-IP          $remote_addr;
        proxy_set_header            X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header            X-Forwarded-Proto  $scheme;
        proxy_read_timeout          600s;
        proxy_buffering             off;
        proxy_cache                 off;
        chunked_transfer_encoding   on;
    }

    location = /chat/cleanup { return 403; }

    location = /chat {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade            $http_upgrade;
        proxy_set_header   Connection         "upgrade";
        proxy_set_header   Host               $host;
        proxy_set_header   X-Real-IP          $remote_addr;
        proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto  $scheme;
        proxy_read_timeout 300s;
        proxy_buffering    off;
    }

    location = /chat/ {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade            $http_upgrade;
        proxy_set_header   Connection         "upgrade";
        proxy_set_header   Host               $host;
        proxy_set_header   X-Real-IP          $remote_addr;
        proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto  $scheme;
        proxy_read_timeout 300s;
        proxy_buffering    off;
    }

    location /chat/ {
        proxy_pass         http://127.0.0.1:8001/chat/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade            $http_upgrade;
        proxy_set_header   Connection         "upgrade";
        proxy_set_header   Host               $host;
        proxy_set_header   X-Real-IP          $remote_addr;
        proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto  $scheme;
        proxy_read_timeout 3600s;
        proxy_buffering    off;
    }
}