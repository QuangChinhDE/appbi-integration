# ============================================================
# IntegrationHub — Host-level Nginx for VM deployment
# Target: Ubuntu VM + Docker Compose + Let's Encrypt
#
# This file is modeled after appbi-ai/nginx.conf, but adapted for
# appbi-integration's current production ports:
#   Frontend : 127.0.0.1:3002
#   Backend  : 127.0.0.1:8010
#
# Setup summary:
#   1. Keep docker-compose services bound to 127.0.0.1.
#   2. Replace both CHANGE_THIS_DOMAIN markers below.
#   3. Copy this file to /etc/nginx/sites-available/appbi-integration.conf
#   4. Enable it, test nginx, then run certbot.
#
# Example:
#   sudo cp nginx.host.conf /etc/nginx/sites-available/appbi-integration.conf
#   sudo ln -s /etc/nginx/sites-available/appbi-integration.conf /etc/nginx/sites-enabled/appbi-integration.conf
#   sudo nginx -t
#   sudo systemctl reload nginx
#   sudo certbot --nginx -d your-domain.com
# ============================================================

server {
    listen 80;
    listen [::]:80;
    server_name integration.example.com;  # CHANGE_THIS_DOMAIN

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name integration.example.com;  # CHANGE_THIS_DOMAIN

    # Comment these 4 lines out for the very first HTTP-only nginx test if needed.
    ssl_certificate     /etc/letsencrypt/live/integration.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/integration.example.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 250m;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Frontend SPA
    location / {
        proxy_pass         http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade            $http_upgrade;
        proxy_set_header   Connection         "upgrade";
        proxy_set_header   Host               $host;
        proxy_set_header   X-Real-IP          $remote_addr;
        proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto  $scheme;
        proxy_read_timeout 300s;
        proxy_buffering    off;
        add_header         Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Backend API — preserve the /api/v1 prefix
    location /api/v1/ {
        proxy_pass         http://127.0.0.1:8010/api/v1/;
        proxy_http_version 1.1;
        proxy_set_header   Host               $host;
        proxy_set_header   X-Real-IP          $remote_addr;
        proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto  $scheme;
        proxy_read_timeout 300s;
    }
}