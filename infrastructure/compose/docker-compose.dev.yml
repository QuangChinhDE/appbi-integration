# Deprecated helper copy.
# Prefer running from the repository root:
#   docker compose -f docker-compose.dev.yml up --build -d

services:
  postgres:
    image: postgres:15-alpine
    container_name: integrationhub-db-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: integrationhub
      POSTGRES_USER: integrationhub
      POSTGRES_PASSWORD: integrationhub_password_2026
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../../packages/database/src/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - integrationhub-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U integrationhub"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    container_name: integrationhub-backend-dev
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://integrationhub:integrationhub_password_2026@postgres:5432/integrationhub
      SECRET_KEY: change-this-secret-key-in-production-2026
      CORS_ORIGINS: http://localhost:3002,http://frontend:3002
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-http://localhost:8010/api/google/callback}
      GCP_SERVICE_ACCOUNT_EMAIL: ${GCP_SERVICE_ACCOUNT_EMAIL:-}
      GCP_SERVICE_ACCOUNT_JSON: ${GCP_SERVICE_ACCOUNT_JSON:-}
      GCP_SERVICE_ACCOUNT_TYPE: ${GCP_SERVICE_ACCOUNT_TYPE:-service_account}
      GCP_SERVICE_ACCOUNT_PROJECT_ID: ${GCP_SERVICE_ACCOUNT_PROJECT_ID:-}
      GCP_SERVICE_ACCOUNT_PRIVATE_KEY_ID: ${GCP_SERVICE_ACCOUNT_PRIVATE_KEY_ID:-}
      GCP_SERVICE_ACCOUNT_PRIVATE_KEY: ${GCP_SERVICE_ACCOUNT_PRIVATE_KEY:-}
      GCP_SERVICE_ACCOUNT_CLIENT_EMAIL: ${GCP_SERVICE_ACCOUNT_CLIENT_EMAIL:-}
      GCP_SERVICE_ACCOUNT_CLIENT_ID: ${GCP_SERVICE_ACCOUNT_CLIENT_ID:-}
      GCP_SERVICE_ACCOUNT_AUTH_URI: ${GCP_SERVICE_ACCOUNT_AUTH_URI:-https://accounts.google.com/o/oauth2/auth}
      GCP_SERVICE_ACCOUNT_TOKEN_URI: ${GCP_SERVICE_ACCOUNT_TOKEN_URI:-https://oauth2.googleapis.com/token}
      GCP_SERVICE_ACCOUNT_AUTH_PROVIDER_X509_CERT_URL: ${GCP_SERVICE_ACCOUNT_AUTH_PROVIDER_X509_CERT_URL:-https://www.googleapis.com/oauth2/v1/certs}
      GCP_SERVICE_ACCOUNT_CLIENT_X509_CERT_URL: ${GCP_SERVICE_ACCOUNT_CLIENT_X509_CERT_URL:-}
      GCP_SERVICE_ACCOUNT_UNIVERSE_DOMAIN: ${GCP_SERVICE_ACCOUNT_UNIVERSE_DOMAIN:-googleapis.com}
      PYTHONPATH: /app
    ports:
      - "8010:8000"
    volumes:
      - ../../:/app
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - integrationhub-network
    command: uvicorn apps.api.src.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile.dev
    container_name: integrationhub-frontend-dev
    working_dir: /app
    restart: unless-stopped
    environment:
      CHOKIDAR_USEPOLLING: "true"
      VITE_PROXY_TARGET: http://backend:8000
      VITE_PORT: "3002"
    ports:
      - "3002:3002"
    volumes:
      - ../../:/app
      - root_node_modules:/app/node_modules
      - web_node_modules:/app/apps/web/node_modules
    depends_on:
      - backend
    networks:
      - integrationhub-network

networks:
  integrationhub-network:
    driver: bridge

volumes:
  postgres_data:
  root_node_modules:
  web_node_modules: